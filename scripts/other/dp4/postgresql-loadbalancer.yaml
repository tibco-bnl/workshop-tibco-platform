apiVersion: v1
kind: Service
metadata:
  name: postgresql-external
  namespace: tibco-ext
  annotations:
    # external-dns will create a DNS record for this service
    external-dns.alpha.kubernetes.io/hostname: postgres.mle.atsnl-emea.azure.dataplanes.pro
    # Optional: Add a description
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /
spec:
  type: LoadBalancer
  ports:
  - name: postgresql
    port: 5432
    protocol: TCP
    targetPort: 5432
  selector:
    app.kubernetes.io/component: primary
    app.kubernetes.io/instance: postgresql
    app.kubernetes.io/name: postgresql
  # IP whitelist - only allow access from these sources
  loadBalancerSourceRanges:
  - 63.34.112.27/32      # Allowed IP 1
  - 18.200.217.204/32    # Allowed IP 2
  - 108.129.54.220/32    # Allowed IP 3
  - 62.250.248.64/32     # Allowed IP 4
  - 217.120.32.76/32     # Allowed IP 5
  - 86.90.167.198/32     # Allowed IP 6
  - 86.95.114.49/32      # Allowed IP 7
  - 10.4.0.0/16          # AKS cluster internal network
  # Use cluster IP for better performance
  externalTrafficPolicy: Cluster
